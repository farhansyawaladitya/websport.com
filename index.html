<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisa Perbandingan Sport Cars</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Analisa Perbandingan Sport Cars</h1>

    <p class="subtitle">
        Masukkan tujuan penggunaan mobil sport, lalu pilih dua mobil
        untuk dibandingkan menggunakan metode ORESTE.
    </p>

    <div class="card">

        <label>🏁 TUJUAN PEMILIHAN SPORT CAR</label>

        <input
            type="text"
            id="tujuan"
            placeholder="Contoh : Drag Race, Daily, Track Day, Koleksi, dll">

        <div class="tag-list">

            <span>Kecepatan</span>
            <span>Akselerasi</span>
            <span>Handling</span>
            <span>Kenyamanan</span>
            <span>Harga</span>
            <span>Efisiensi</span>
            <span>Teknologi</span>

        </div>

        <div class="compare">

            <div>

                <label>SPORT CAR A</label>

                <select id="mobilA">
                    <option value="">-- Pilih Sport Car --</option>
                </select>

            </div>

            <div class="vs">
                VS
            </div>

            <div>

                <label>SPORT CAR B</label>

                <select id="mobilB">
                    <option value="">-- Pilih Sport Car --</option>
                </select>

            </div>

        </div>

        <button id="btnAnalisa">
            Analisa Sekarang →
        </button>

    </div>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
